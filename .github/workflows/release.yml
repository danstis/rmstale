name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tag:
    name: Tag build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gitversion.outputs.FullSemVer }}
      prerelease: ${{ steps.gitversion.outputs.PreReleaseTagWithDash }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: "6.x"
      - name: Version with GitVersion # https://github.com/marketplace/actions/use-actions
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        if: ${{ steps.gitversion.outputs.PreReleaseTagWithDash == '' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.gitversion.outputs.FullSemVer }}
          release_branches: main
          tag_prefix: v
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: tag
    if: ${{ needs.tag.outputs.prerelease == '' }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check if commit is tagged
        run: git describe --tags --exact-match
      - name: Set up Go 1.x
        uses: actions/setup-go@v6
        with:
          go-version: ^1.25
        id: go
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.0.0
        with:
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace version in NuSpec file
        uses: cschleiden/replace-tokens@v1
        env:
          GitVersion_NuGetVersionV2: ${{ needs.tag.outputs.version }}
        with:
          files: '["rmstale.nuspec"]'
      - name: Create directory for chocolaty package
        run: mkdir -p ${{ github.workspace }}/bin/chocolatey
      - name: Package chocolaty binary # Output path refers to the mapped docker volume (/wksp)
        uses: crazy-max/ghaction-chocolatey@v4
        with:
          args: pack rmstale.nuspec --outputdirectory /wksp/bin/chocolatey
      - name: Push package to chocolatey.org
        uses: crazy-max/ghaction-chocolatey@v4
        with:
          args: push /wksp/bin/chocolatey/rmstale.${{ needs.tag.outputs.version }}.nupkg --source https://push.chocolatey.org/ --apikey ${{ secrets.CHOCO_KEY }}

  request-signing:
    name: Request OSSign signing
    runs-on: ubuntu-latest
    needs: [tag, release]
    if: ${{ needs.tag.outputs.prerelease == '' }}
    permissions:
      actions: write
    steps:
      - name: Dispatch signing request to OSSign
        id: dispatch
        uses: ossign/actions/workflow/dispatch@fbf0b39466d9409f05d1efc0e58cc3e4615ac625
        with:
          username: ${{ secrets.OSSIGN_USER }}
          token: ${{ secrets.OSSIGN_TOKEN }}
          dispatch_only: true

      - name: Store pending signing state
        run: |
          gh variable set OSSIGN_PENDING_WORKFLOW_ID --body "${{ steps.dispatch.outputs.workflow_id }}"
          gh variable set OSSIGN_RELEASE_TAG --body "v${{ needs.tag.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-repo:
    name: Sync winget-pkgs repo
    runs-on: ubuntu-latest
    environment: winget
    steps:
      - run: |
          set +e
          output=$(gh repo sync danstis/winget-pkgs -b master 2>&1)
          status=$?
          set -e

          printf '%s\n' "$output"

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if printf '%s' "$output" | grep -Fq "require the \`workflow\` scope or permission to merge"; then
            echo "::warning::winget-pkgs sync skipped because WINGET_PAT is missing workflow scope"
            exit 0
          fi

          exit "$status"
        env:
          GH_TOKEN: ${{ secrets.WINGET_PAT }}
