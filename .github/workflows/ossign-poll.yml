name: OSSign Polling

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  find-pending:
    name: Find pending signing requests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      pending: ${{ steps.find.outputs.pending }}
      has_pending: ${{ steps.find.outputs.has_pending }}
    steps:
      - name: Find releases pending signing
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pending='[]'
          tags=$(gh release list --repo ${{ github.repository }} --limit 20 --json tagName,isPrerelease \
            --jq '[.[] | select(.isPrerelease) | .tagName]')

          if [ "$tags" != "[]" ] && [ -n "$tags" ]; then
            while IFS= read -r tag; do
              browser_url=$(gh release view "$tag" --repo ${{ github.repository }} --json assets \
                --jq '.assets[] | select(.name == ".ossign-pending") | .browser_download_url' 2>/dev/null)
              if [ -n "$browser_url" ]; then
                workflow_id=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" "$browser_url" 2>/dev/null | tr -d '[:space:]')
                if [ -n "$workflow_id" ]; then
                  pending=$(echo "$pending" | jq --arg tag "$tag" --arg wid "$workflow_id" '. + [{"tag": $tag, "workflow_id": $wid}]')
                fi
              fi
            done < <(echo "$tags" | jq -r '.[]')
          fi

          if [ "$pending" == "[]" ]; then
            echo "No pending signing requests found."
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "pending=[]" >> $GITHUB_OUTPUT
          else
            echo "Pending releases: $pending"
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "pending=$pending" >> $GITHUB_OUTPUT
          fi

  poll:
    name: Check OSSign signing status (${{ matrix.tag }})
    runs-on: ubuntu-latest
    needs: find-pending
    if: needs.find-pending.outputs.has_pending == 'true'
    strategy:
      matrix:
        include: ${{ fromJson(needs.find-pending.outputs.pending) }}
      fail-fast: false
    permissions:
      contents: write
    outputs:
      signing_complete: ${{ steps.set-complete.outputs.signing_complete }}
    steps:
      - name: Check OSSign signing status
        id: ossign-check
        uses: ossign/actions/workflow/dispatch@fbf0b39466d9409f05d1efc0e58cc3e4615ac625
        with:
          username: ${{ secrets.OSSIGN_USER }}
          token: ${{ secrets.OSSIGN_TOKEN }}
          single_check: ${{ matrix.workflow_id }}

      - name: Replace release assets with signed files
        if: steps.ossign-check.outputs.signed_artifacts != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNED_ARTIFACTS: ${{ steps.ossign-check.outputs.signed_artifacts }}
        run: |
          echo "$SIGNED_ARTIFACTS" | jq -c '.[]' | while IFS= read -r artifact; do
            name=$(echo "$artifact" | jq -r '.name')
            url=$(echo "$artifact" | jq -r '.browser_download_url')
            curl -fsSL -o "$name" "$url"
            gh release upload "${{ matrix.tag }}" "$name" --clobber --repo ${{ github.repository }}
            echo "Replaced: $name"
          done

      - name: Clear pending signing state
        if: steps.ossign-check.outputs.signed_artifacts != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset_id=$(gh api "repos/${{ github.repository }}/releases/tags/${{ matrix.tag }}" \
            --jq '.assets[] | select(.name == ".ossign-pending") | .id')
          gh api "repos/${{ github.repository }}/releases/assets/$asset_id" -X DELETE
          gh release edit "${{ matrix.tag }}" --prerelease=false --repo ${{ github.repository }}

      - name: Set signing complete flag
        if: steps.ossign-check.outputs.signed_artifacts != ''
        id: set-complete
        run: echo "signing_complete=true" >> $GITHUB_OUTPUT

  mark-latest:
    name: Mark newest release as latest
    runs-on: ubuntu-latest
    needs: poll
    if: needs.poll.outputs.signing_complete == 'true'
    permissions:
      contents: write
    steps:
      - name: Set latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest_tag=$(gh release list --repo ${{ github.repository }} --exclude-drafts --exclude-pre-releases --limit 1 \
            --json tagName --jq '.[0].tagName')
          gh release edit "$latest_tag" --latest --repo ${{ github.repository }}

  winget:
    name: Publish winget package
    runs-on: windows-latest
    needs: mark-latest
    if: needs.mark-latest.result == 'success'
    environment: winget
    steps:
      - name: Submit danstis.rmstale package to WinGet Community Repository
        env:
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
        run: |
          $ErrorActionPreference = "Stop"

          $wingetPackage = "danstis.rmstale"
          $gitToken = $env:WINGET_PAT

          $github = Invoke-RestMethod -uri "https://api.github.com/repos/danstis/rmstale/releases"

          $targetRelease = $github | Where-Object {-not $_.draft -and -not $_.prerelease} | Select -First 1
          $installerAmd64Url = $targetRelease.assets | Where-Object {$_.name -match 'rmstale_.*_windows_x86_64.zip'} | Select -ExpandProperty browser_download_url -First 1
          $installerArm64Url = $targetRelease.assets | Where-Object {$_.name -match 'rmstale_.*_windows_arm64.zip'} | Select -ExpandProperty browser_download_url -First 1
          $installerX86Url = $targetRelease.assets | Where-Object {$_.name -match 'rmstale_.*_windows_i386.zip'} | Select -ExpandProperty browser_download_url -First 1
          $ver = $targetRelease.tag_name.Trim("v")

          if (-not $installerAmd64Url -or -not $installerArm64Url -or -not $installerX86Url -or -not $ver) {
            Write-Error "One or more installer URLs are empty."
          }

          iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          try {
            .\wingetcreate.exe update $wingetPackage --submit --version $ver --urls $installerAmd64Url $installerArm64Url $installerX86Url --token $gitToken
          } catch {
            Write-Error "Failed to submit the winget package: $_"
          }
